# LinuxHUD 配置文件
# 位置：/etc/linuxhud.conf

# 显示设置
display {
    # 位置
    x = 10
    y = 10
    
    # 大小
    width = 300
    height = 100
    
    # 透明度 (0-255)
    alpha = 200
    
    # Z轴顺序
    z_order = 1
}

# 文本设置
text {
    # 默认文本
    default = "LinuxHUD"
    
    # 字体设置
    font_family = "Sans"
    font_size = 24
    
    # 颜色 (ARGB十六进制)
    color = "FFFFFFFF"
    background = "80000000"
}

# 平面设置
plane {
    # 首选平面类型
    # overlay - 硬件叠加平面 (优先)
    # cursor - 光标平面
    # primary - 主平面 (最后选择)
    preferred = "overlay"
    
    # 是否自动回退到其他平面
    fallback = true
}

# 刷新设置
refresh {
    # 刷新率 (Hz)
    rate = 60
    
    # 是否启用垂直同步
    vsync = true
}

# 日志设置
logging {
    # 日志级别
    level = "info"
    
    # 日志文件
    file = "/var/log/linuxhud.log"
    
    # 是否输出到控制台
    console = true
}

# 守护进程设置
daemon {
    # 是否以守护进程模式运行
    enabled = false
    
    # PID 文件
    pid_file = "/var/run/linuxhud.pid"
    
    # 用户和组
    user = "root"
    group = "video"
}
